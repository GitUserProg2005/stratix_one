services:
  db:
    image: postgres:16
    restart: always
    volumes:
      - ./tmp/db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: wix
      POSTGRES_USER: wix_user
      POSTGRES_PASSWORD: wix@228339
    ports:
      - 5433:5432

  meilisearch:
    image: getmeili/meilisearch:v0.28
    container_name: app_meilisearch_bot
    environment:
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=masterKey
    ports:
      - 7701:7700
    volumes:
      - meilisearch-data:/meili_data

  redis:
    image: redis:7-alpine
    container_name: redis-messenger
    ports: 
      - "6380:6379"
    restart: unless-stopped 

  app:
    build:
      context: .
      dockerfile: _Docker/Dockerfile
      args:
        VITE_REVERB_APP_KEY: ${VITE_REVERB_APP_KEY}
        VITE_REVERB_HOST: ${VITE_REVERB_HOST}
        VITE_REVERB_PORT: ${VITE_REVERB_PORT}
        VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME}
        VITE_APP_NAME: ${APP_NAME:-Laravel}
    image: wix-app:latest
    container_name: wix-app
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
    volumes:
      - wix-storage:/var/www/wix/todo/storage
      - wix-cache:/var/www/wix/todo/bootstrap/cache
    depends_on:
      - db
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9000:9000"

  reverb:
    image: wix-app:latest
    container_name: wix-reverb
    command: php artisan reverb:start
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8081
    volumes:
      - wix-storage:/var/www/wix/todo/storage
      - wix-cache:/var/www/wix/todo/bootstrap/cache
    depends_on:
      - app
      - redis
    ports:
      - "8081:8081"
    restart: unless-stopped

  queue:
    image: wix-app:latest
    container_name: wix-queue
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
    volumes:
      - wix-storage:/var/www/wix/todo/storage
      - wix-cache:/var/www/wix/todo/bootstrap/cache
    depends_on:
      - app
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  meilisearch-data:
  wix-storage:
  wix-cache:
