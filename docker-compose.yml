name: stratix_one

services:
  app:
    build:
      context: .
      dockerfile: _Docker/Dockerfile
      network: host
      args:
        VITE_REVERB_APP_KEY: ${VITE_REVERB_APP_KEY}
        VITE_REVERB_HOST: ${VITE_REVERB_HOST}
        VITE_REVERB_PORT: ${VITE_REVERB_PORT}
        VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME}
        VITE_APP_NAME: ${APP_NAME:-Laravel}
    image: stratix_one-app:latest
    container_name: stratix_one-app
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
    volumes:
      - stratix_one-storage:/var/www/stratix_one/storage
      - stratix_one-cache:/var/www/stratix_one/bootstrap/cache
    depends_on:
      - db
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9000:9000"

  reverb:
    image: stratix_one-app:latest
    container_name: stratix_one-reverb
    command: php artisan reverb:start --debug
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8081
    volumes:
      - stratix_one-storage:/var/www/stratix_one/storage
      - stratix_one-cache:/var/www/stratix_one/bootstrap/cache
    depends_on:
      - app
      - redis
    ports:
      - "8081:8081"
    restart: unless-stopped

  queue:
    image: stratix_one-app:latest
    container_name: stratix_one-queue
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
    volumes:
      - stratix_one-storage:/var/www/stratix_one/storage
      - stratix_one-cache:/var/www/stratix_one/bootstrap/cache
    depends_on:
      - app
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  stratix_one-storage:
    name: stratix_one-storage
  stratix_one-cache:
    name: stratix_one-cache
