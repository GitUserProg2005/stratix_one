  db:
    build:
      context: ./_Docker/postgres
      dockerfile: Dockerfile.single
    image: stratix_one-db:16-postgis
    container_name: db
    restart: always
    volumes:
      - ./tmp/db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"

