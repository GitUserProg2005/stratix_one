services:
  tileserver:
    image: maptiler/tileserver-gl
    container_name: tileserver
    ports:
      - "8082:8080"
    volumes:
      - ./_Docker/tiles:/data

  osrm:
    image: osrm/osrm-backend
    container_name: osrm
    ports:
      - "5000:5000"
    volumes:
      - ./_Docker/osrm:/data
    command: osrm-routed --algorithm mld /data/map.osrm
    restart: unless-stopped

  # nominatim:
