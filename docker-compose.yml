  meilisearch:
    image: getmeili/meilisearch:v0.28
    container_name: app_meilisearch_bot
    environment:
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=masterKey
    ports:
      - 7700:7700
    volumes:
      - meilisearch-data:/meili_data

  redis:
