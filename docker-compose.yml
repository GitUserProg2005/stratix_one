services:
  db:
    image: postgres:16
    restart: always
    volumes:
      - ./tmp/db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: wix
      POSTGRES_USER: wix_user
      POSTGRES_PASSWORD: wix@228339
    ports:
      - 5433:5432

  meilisearch:
    image: getmeili/meilisearch:v0.28
    container_name: app_meilisearch_bot
    environment:
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=masterKey
    ports:
      - 7701:7700
    volumes:
      - meilisearch-data:/meili_data

  redis:
    image: redis:7-alpine
    container_name: redis-messenger
    ports: 
      - "6380:6379"
    restart: unless-stopped 

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: wix-app:latest
    container_name: wix-app
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
      # Бэкенд (Laravel) в контейнере подключается к Reverb по имени сервиса
      REVERB_HOST: reverb
      REVERB_PORT: "8081"
    volumes:
      # - wix-storage:/var/www/wix/todo/storage
      # - wix-cache:/var/www/wix/todo/bootstrap/cache
      - ./:/var/www/wix/todo
    depends_on:
      - db
      - redis
    ports:
      - "9000:9000"

  reverb:
    image: wix-app:latest
    container_name: wix-reverb
    command: php artisan reverb:start
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8081
    volumes:
      - ./:/var/www/wix/todo
    depends_on:
      - app
      - redis
    ports:
      - "8081:8081"
    restart: unless-stopped

volumes:
  meilisearch-data:
  wix-storage:
  wix-cache:
