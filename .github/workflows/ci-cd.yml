name: Build and Deploy Laravel Docker App

on:
  push:
    branches:
      - master
      - main

env:
  REGISTRY: ghcr.io
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/var/www/stratix_one' }}
  COMPOSE_FILE: ${{ vars.COMPOSE_FILE || 'docker-compose.yml' }}

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      # 1. Скачать код
      - name: Checkout repository
        uses: actions/checkout@v4

      # Имя репозитория в lowercase (Docker/GHCR требуют только нижний регистр)
      - name: Set repository name lowercase
        id: repo
        run: echo "lowercase=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # 2. Войти в GitHub Container Registry
      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login $REGISTRY -u ${{ github.actor }} --password-stdin

      # 3. Собрать Docker image (Dockerfile в _Docker/, build-args для Vite)
      - name: Build Docker image
        run: |
          docker build \
            -f _Docker/Dockerfile \
            --build-arg VITE_REVERB_APP_KEY="${{ vars.VITE_REVERB_APP_KEY || '' }}" \
            --build-arg VITE_REVERB_HOST="${{ vars.VITE_REVERB_HOST || 'localhost' }}" \
            --build-arg VITE_REVERB_PORT="${{ vars.VITE_REVERB_PORT || '8081' }}" \
            --build-arg VITE_REVERB_SCHEME="${{ vars.VITE_REVERB_SCHEME || 'https' }}" \
            --build-arg VITE_APP_NAME="${{ vars.VITE_APP_NAME || 'Laravel' }}" \
            -t $REGISTRY/${{ steps.repo.outputs.lowercase }}/app:latest \
            -t $REGISTRY/${{ steps.repo.outputs.lowercase }}/app:${{ github.sha }} \
            .


      # 4. Проверить, что image запускается (smoke test; приложение — php-fpm на 9000)
      - name: Run container (smoke test)
        run: |
          docker run -d --name test_container \
            -p 9000:9000 \
            $REGISTRY/${{ steps.repo.outputs.lowercase }}/app:latest

          sleep 5

          docker ps
          docker logs test_container

          docker stop test_container
          docker rm test_container


      # 5. Push image в registry
      - name: Push Docker image
        run: |
          docker push $REGISTRY/${{ steps.repo.outputs.lowercase }}/app:latest
          docker push $REGISTRY/${{ steps.repo.outputs.lowercase }}/app:${{ github.sha }}


      # 6. Deploy на сервер
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          IMAGE: ${{ env.REGISTRY }}/${{ steps.repo.outputs.lowercase }}/app:latest
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_PAT,GHCR_USER,IMAGE,REGISTRY,DEPLOY_PATH,COMPOSE_FILE
          script: |
            set -e
            cd "$DEPLOY_PATH"

            if [ -z "$GHCR_PAT" ] || [ -z "$GHCR_USER" ]; then
              echo "GHCR_PAT or GHCR_USER is empty — check repository secrets" >&2
              exit 1
            fi

            printf '%s' "$GHCR_PAT" | docker login "$REGISTRY" -u "$GHCR_USER" --password-stdin

            echo "Pull new image from GHCR"
            docker pull "$IMAGE"
            docker tag "$IMAGE" stratix_one-app:latest

            echo "Restart containers with new image"
            docker compose -f "$COMPOSE_FILE" up -d --no-build --force-recreate --remove-orphans app reverb queue

            echo "Sync built static from container to host"
            export HOST_BUILD_PATH="$DEPLOY_PATH/public/build"
            export CONTAINER_BUILD_PATH="/var/www/stratix_one/public/build"
            sh _Docker/sync-public-build.sh

            echo "Wait for database (postgres-haproxy may need time after restart)"
            for i in $(seq 1 45); do
              if docker compose -f "$COMPOSE_FILE" exec -T app php -r '
                $h = getenv("DB_HOST") ?: "postgres-haproxy";
                $db = getenv("DB_DATABASE") ?: "laravel";
                $u = getenv("DB_USERNAME") ?: "postgres";
                $p = getenv("DB_PASSWORD") ?: "secret";
                new PDO("pgsql:host=$h;port=5432;dbname=$db", $u, $p);
              ' >/dev/null 2>&1; then
                echo "Database is ready"
                break
              fi
              if [ "$i" -eq 45 ]; then
                echo "Database not ready after 90s" >&2
                exit 1
              fi
              echo "Waiting for database ($i/45)..."
              sleep 2
            done

            echo "Run migrations"
            docker compose -f "$COMPOSE_FILE" exec -T app php artisan migrate --force

            echo "Cache config"
            docker compose -f "$COMPOSE_FILE" exec -T app php artisan config:cache

            echo "Cache routes"
            docker compose -f "$COMPOSE_FILE" exec -T app php artisan route:cache

            echo "Restart queues"
            docker compose -f "$COMPOSE_FILE" exec -T app php artisan queue:restart || true

            echo "Restart Reverb"
            docker compose -f "$COMPOSE_FILE" restart reverb || true

            echo "Clear old images"
            docker image prune -af