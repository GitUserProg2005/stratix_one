global
  # optional; if the container doesn't have syslog, HAProxy still works
  log stdout format raw local0

resolvers docker
  nameserver dns 127.0.0.11:53
  resolve_retries 3
  timeout resolve 1s
  timeout retry   1s
  hold valid      10s

defaults
  mode tcp
  log global
  timeout connect 10s
  timeout client 1m
  timeout server 1m
  timeout check 3s

frontend postgresql
  bind *:5432
  default_backend postgresql_primary_only

# Route only to PRIMARY by checking pg_is_in_recovery() == false ("f").
backend postgresql_primary_only
  option tcp-check
  tcp-check connect

  # StartupMessage (no password) as user=postgres db=postgres
  tcp-check send-binary 00000029
  tcp-check send-binary 00030000
  tcp-check send-binary 7573657200
  tcp-check send-binary 706f73746772657300
  tcp-check send-binary 646174616261736500
  tcp-check send-binary 706f73746772657300
  tcp-check send-binary 00

  # Expect AuthenticationOk
  tcp-check expect binary 52
  tcp-check expect binary 00000008
  tcp-check expect binary 00000000

  # SimpleQuery: select pg_is_in_recovery();
  tcp-check send-binary 51
  tcp-check send-binary 00000020
  tcp-check send-binary 73656c65637420
  tcp-check send-binary 70675f69735f696e5f7265636f7665727928293b
  tcp-check send-binary 00

  # RowDescription for column "pg_is_in_recovery"
  tcp-check expect binary 54
  tcp-check expect binary 0000002a
  tcp-check expect binary 0001
  tcp-check expect binary 70675f69735f696e5f7265636f7665727900
  tcp-check expect binary 00000000
  tcp-check expect binary 0000
  tcp-check expect binary 00000010
  tcp-check expect binary 0001
  tcp-check expect binary ffffffff
  tcp-check expect binary 0000

  # DataRow: expect "f" (primary). Standby returns "t" and will be marked DOWN.
  tcp-check expect binary 44
  tcp-check expect binary 0000000b
  tcp-check expect binary 0001
  tcp-check expect binary 00000001
  tcp-check expect binary 66

  # Terminate
  tcp-check send-binary 58
  tcp-check send-binary 00000004

  default-server inter 2s fall 2 rise 1 on-marked-down shutdown-sessions
  server postgres-primary postgres-primary:5432 check resolvers docker resolve-prefer ipv4 init-addr libc,none
  server postgres-replica postgres-replica:5432 check resolvers docker resolve-prefer ipv4 init-addr libc,none

