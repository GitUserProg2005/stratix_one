global
  # optional; if the container doesn't have syslog, HAProxy still works
  log stdout format raw local0

resolvers docker
  nameserver dns 127.0.0.11:53
  resolve_retries 3
  timeout resolve 1s
  timeout retry   1s
  hold valid      10s

defaults
  mode tcp
  log global
  timeout connect 10s
  timeout client 1m
  timeout server 1m
  timeout check 3s

frontend postgresql
  bind *:5432
  default_backend postgresql_primary_only

# Prefer PRIMARY. Replica is kept as a BACKUP to avoid flapping from strict
# Postgres-protocol healthchecks.
backend postgresql_primary_only
  option tcp-check
  tcp-check connect

  # Less disruptive failover:
  # - don't force-close existing client sessions when a backend is temporarily DOWN
  # - require multiple consecutive failures/successes before changing status
  default-server inter 2s fall 3 rise 2
  server postgres-primary postgres-primary:5432 check resolvers docker resolve-prefer ipv4 init-addr libc,none
  server postgres-replica postgres-replica:5432 check backup resolvers docker resolve-prefer ipv4 init-addr libc,none

